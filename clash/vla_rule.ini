[custom]
;不要随意改变关键字，否则会导致出错
;acl4SSR规则

;去广告：支持
;自动测速：支持
;苹果分流：支持
;增强中国IP段：支持
;增强国外GFW：支持

;设置规则标志位
ruleset=adblock,[]GEOSITE,category-ads-all
ruleset=全球直连,[]GEOSITE,private
ruleset=全球直连,[]GEOSITE,category-games@cn
ruleset=apple,[]GEOSITE,apple-cn,DIRECT
ruleset=Ai平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list
ruleset=Ai平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=国外媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=youtube,[]GEOSITE,youtube
ruleset=telegram,[]GEOSITE,telegram
ruleset=twitter,[]GEOSITE,twitter
ruleset=google,[]GEOSITE,google
ruleset=全球直连,[]GEOSITE,cn
ruleset=gfw,[]GEOSITE,geolocation-!cn
ruleset=telegram,[]GEOIP,telegram
ruleset=google,[]GEOIP,google
ruleset=twitter,[]GEOIP,twitter
ruleset=全球直连,[]GEOIP,private,no-resolve
ruleset=全球直连,[]GEOIP,CN
ruleset=漏网之鱼,[]FINAL
;设置规则标志位

;设置分组标志位
custom_proxy_group=gfw`select`[]自动选择`[]香港节点`[]台湾节点`[]狮城节点`[]日本节点`[]美国节点`[]韩国节点`[]手动切换`[]DIRECT
